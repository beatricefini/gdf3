<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>AR Project 3 - Marker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <!-- AR.js aggiornato -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="antialias: true; alpha: true"
    vr-mode-ui="enabled: false"
  >
    <!-- Marker Hiro -->
    <a-marker preset="hiro" id="hiroMarker">
      <!-- Container per i modelli -->
      <a-entity id="modelsContainer"></a-entity>
    </a-marker>

    <!-- Camera AR -->
    <a-entity camera></a-entity>
  </a-scene>

  <!-- Overlay testo iniziale -->
  <div id="overlay" style="position:absolute; top:0; left:0; right:0; text-align:center; color:white; font-family:sans-serif; padding:10px;">
    Tap the screen to create your own little cinema
  </div>

  <script src="js/main.js"></script>
</body>
</html>
